name: CI — DeepShield AI

on:
  push:
    branches: [main, copilot/**]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Use a dummy key so build succeeds without a real key.
          # The app falls back gracefully when HF_API_KEY is absent/invalid.
          HF_API_KEY: dummy_ci_key

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: node scripts/smoke-test.js
        env:
          HF_API_KEY: dummy_ci_key
